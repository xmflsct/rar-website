name: E2E Tests

on:
  check_run:
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-tests:
    if: >-
      (
        github.event_name == 'workflow_dispatch'
      ) || (
        github.event.check_run.conclusion == 'success' &&
        github.event.check_run.check_suite.head_branch == 'main' &&
        github.event.check_run.name == 'Workers Builds: rar-website'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository for automatic run
        if: github.event_name == 'check_run'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.check_run.head_sha }}

      - name: Checkout repository for manual run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ vars.WORKERS_PREVIEW_URL }}
          CONTENTFUL_SPACE: ${{ vars.CONTENTFUL_SPACE || 'u0x1afixkalo' }}
          CONTENTFUL_KEY_PREVIEW: ${{ secrets.CONTENTFUL_KEY_PREVIEW }}
          CONTENTFUL_PAT_PREVIEW: ${{ secrets.CONTENTFUL_PAT_PREVIEW }}
          STRIPE_KEY_ADMIN_PREVIEW: ${{ secrets.STRIPE_KEY_ADMIN_PREVIEW }}
          STRIPE_KEY_PRIVATE_PREVIEW: ${{ secrets.STRIPE_KEY_PRIVATE_PREVIEW }}
          WEBHOOK_STRIPE_MYPARCEL_KEY_PREVIEW: ${{ secrets.WEBHOOK_STRIPE_MYPARCEL_KEY_PREVIEW }}
          WEBHOOK_STRIPE_SIGNING_SECRET_PREVIEW: ${{ secrets.WEBHOOK_STRIPE_SIGNING_SECRET_PREVIEW }}

      - name: Promote Worker version
        if: github.event_name == 'check_run'
        run: |
          VERSION_ID="$(printf '%s\n' "$CHECK_RUN_SUMMARY" | sed -n 's/^Version ID: //p' | head -n 1)"
          CLOUDFLARE_ACCOUNT_ID="$(printf '%s\n' "$CHECK_RUN_DETAILS_URL" | sed -n 's#^https://dash.cloudflare.com/\([^/]*\)/.*#\1#p')"

          if [ -z "$VERSION_ID" ]; then
            echo "No Worker version ID found in Cloudflare check summary"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "No Cloudflare account ID found in Cloudflare check URL"
            exit 1
          fi

          export CLOUDFLARE_ACCOUNT_ID
          npx wrangler versions deploy \
            --version-id "$VERSION_ID" \
            --percentage 100 \
            --message "Promoted after E2E run ${{ github.run_id }}" \
            --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CHECK_RUN_DETAILS_URL: ${{ github.event.check_run.details_url }}
          CHECK_RUN_SUMMARY: ${{ github.event.check_run.output.summary }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
